<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry</title>
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>

<header>
    <nav class="nav">
        <a href="index.html" class="nav-logo">🍳 PantryPal</a>
        <ul class="nav-links">
            <li><a href="index.html" data-page="home">Home</a></li>
            <li><a href="pantry.html" data-page="pantry">Pantry</a></li>
            <li><a href="results.html" data-page="results">Results</a></li>
            <li><a href="about.html" data-page="about">About</a></li>
        </ul>
        <button type="button" class="nav-back-btn" onclick="window.history.back()">← Back</button>
    </nav>
    <div class="hero-header">
        <h1>Your Pantry</h1>
        <p class="muted">Add what you have, then get recipe ideas.</p>
    </div>
</header>

<main class="page">
    <div class="card">
        <h2>Add ingredients</h2>

        <div class="field-row">
            <label class="sr-only" for="ingredientInput">Ingredient</label>
            <input type="text" id="ingredientInput" placeholder="Enter ingredient (e.g. chicken)" autocomplete="off">
            <button type="button" onclick="addIngredient()">Add</button>
        </div>

        <ul id="ingredientList"></ul>

        <div class="actions">
            <button type="button" onclick="goToResults()">Find Recipes</button>
        </div>
    </div>
</main>

<script>
    (function () {
        const current = "pantry";
        document.querySelectorAll('.nav-links a[data-page="' + current + '"]')
            .forEach(function (link) {
                link.classList.add('active');
            });
    })();
</script>

<script src="script.js"></script>
</body>
</html>
