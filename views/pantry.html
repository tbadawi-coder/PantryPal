<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header>
    <nav class="nav">
        <a href="/" class="nav-logo" aria-label="PantryPal home">
            <img src="/images/pantrypal-logo-latest.png" alt="PantryPal" class="nav-logo-image">
        </a>
        <ul class="nav-links">
            <li><a href="/" data-page="home">Home</a></li>
            <li><a href="/pantry.html" data-page="pantry">Pantry</a></li>
            <li><a href="/results.html" data-page="results">Results</a></li>
            <li><a href="/api/planner" data-page="planner">Planner</a></li>
            <li><a href="/chat" data-page="chat">AI Chat</a></li>
            <li><a href="/about.html" data-page="about">About</a></li>
        </ul>
        <div class="nav-actions" id="nav-auth">
            <a href="http://localhost:3000/users/login" class="btn auth-btn auth-btn-secondary">Sign In</a>
            <a href="http://localhost:3000/users/new" class="btn auth-btn">Sign Up</a>
        </div>
    </nav>
    <div class="hero-header">
        <h1>Your Pantry</h1>
        <p class="muted">Add what you have, then get recipe ideas.</p>
    </div>
</header>

<main class="page">
    <div class="card">
        <h2>Add ingredients</h2>

        <div class="field-row">
            <label class="sr-only" for="ingredientInput">Ingredient</label>
            <input type="text" id="ingredientInput" placeholder="Enter ingredient (e.g. chicken)" autocomplete="off">
            <button type="button" onclick="addIngredient()">Add</button>
        </div>

        <ul id="ingredientList"></ul>

        <div class="actions">
            <button type="button" onclick="goToResults()">Find Recipes</button>
        </div>
    </div>
</main>
<div class="page-back page">
    <button type="button" class="bottom-back-btn" onclick="window.history.back()">← Back</button>
</div>

<script>
    (function () {
        const current = "pantry";
        document.querySelectorAll('.nav-links a[data-page="' + current + '"]')
            .forEach(function (link) {
                link.classList.add('active');
            });
    })();
</script>

<script src="/script.js"></script>
<script>
    fetch('http://localhost:3000/api/me')
        .then(res => res.json())
        .then(data => {
            const navAuth = document.getElementById('nav-auth');
            if (data.loggedIn) {
                const initial = data.username ? data.username[0].toUpperCase() : '?';
                navAuth.innerHTML = `
                    <div class="avatar-wrap">
                        <div class="avatar">${initial}</div>
                        <div class="avatar-dropdown">
                            <span class="avatar-dropdown-name">${data.username}</span>
                            <a href="http://localhost:3000/users/profile">Profile</a>
                            <a href="http://localhost:3000/users/logout" onclick="return confirm('Are you sure you want to log out?')">Log Out</a>
                        </div>
                    </div>`;
            }
        })
        .catch(() => {});
</script>
</body>
</html>
