<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>

<header>
    <nav class="nav">
        <a href="index.html" class="nav-logo">🍳 PantryPal</a>
        <ul class="nav-links">
            <li><a href="index.html" data-page="home">Home</a></li>
            <li><a href="pantry.html" data-page="pantry">Pantry</a></li>
            <li><a href="results.html" data-page="results">Results</a></li>
            <li><a href="about.html" data-page="about">About</a></li>
        </ul>
        <div class="nav-actions">
            <button type="button" class="auth-btn auth-btn-secondary">Sign In</button>
            <button type="button" class="auth-btn">Sign Up</button>
        </div>
    </nav>
    <div class="hero-header">
        <h1>Recipe Results</h1>
        <p class="muted">Meals that match your pantry ingredients.</p>
    </div>
</header>

<main id="recipeResults" class="page">
    <p class="muted">Loading recipes...</p>
</main>
<div class="page-back page">
    <button type="button" class="bottom-back-btn" onclick="window.history.back()">← Back</button>
</div>

<script>
    (function () {
        const current = "results";
        document.querySelectorAll('.nav-links a[data-page="' + current + '"]')
            .forEach(function (link) {
                link.classList.add('active');
            });
    })();
</script>

<script src="../script.js"></script>
</body>
</html>
