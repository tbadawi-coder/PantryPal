<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantryPal</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header>
    <nav class="nav">
        <a href="index.html" class="nav-logo">🍳 PantryPal</a>
        <ul class="nav-links">
            <li><a href="/" data-page="home">Home</a></li>
            <li><a href="/pantry.html" data-page="pantry">Pantry</a></li>
            <li><a href="/results.html" data-page="results">Results</a></li>
            <li><a href="/about.html" data-page="about">About</a></li>
            <li><a href="/chat" data-page="chat">AI Chat</a></li>
        </ul>
        <div class="nav-actions" id="nav-auth">
            <a href="http://localhost:3000/users/login" class="btn auth-btn auth-btn-secondary">Sign In</a>
            <a href="http://localhost:3000/users/new" class="btn auth-btn">Sign Up</a>
        </div>
    </nav>
    <div class="hero-header">
        <h1>🍳 PantryPal</h1>
        <p>Find recipes with ingredients you already have</p>
    </div>
</header>

<main class="page hero center">
    <div class="card hero-card">
        <h2>Start with what you have</h2>
        <p class="muted">Add ingredients, then we will find matching meals.</p>
        <div class="actions">
            <a class="btn" href="/pantry.html">Start Cooking</a>
        </div>
    </div>
</main>
<section class="page home-graphic-section" aria-label="Home page graphic">
    <img
        class="home-graphic"
        src="/images/home-page-graphic.png"
        alt="People reducing food waste and preparing food"
    >
</section>
<div class="page-back page">
    <button type="button" class="bottom-back-btn" onclick="window.history.back()">← Back</button>
</div>
<script>
    fetch('http://localhost:3000/api/me')
        .then(res => res.json())
        .then(data => {
            const navAuth = document.getElementById('nav-auth');
            if (data.loggedIn) {
                const initial = data.username ? data.username[0].toUpperCase() : '?';
                navAuth.innerHTML = `
                    <div class="avatar-wrap">
                        <div class="avatar">${initial}</div>
                        <div class="avatar-dropdown">
                            <span class="avatar-dropdown-name">${data.username}</span>
                            <a href="http://localhost:3000/users/profile">Profile</a>
                            <a href="http://localhost:3000/users/logout">Log Out</a>
                        </div>
                    </div>`;
            }
        })
        .catch(() => {});
</script>
<script>
    (function () {
        const current = "home";
        document.querySelectorAll('.nav-links a[data-page="' + current + '"]')
            .forEach(function (link) {
                link.classList.add('active');
            });
    })();
</script>

</body>
</html>
