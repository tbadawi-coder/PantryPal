<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantryPal</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header>
    <nav class="nav">
        <a href="/" class="nav-logo" aria-label="PantryPal home">
            <img src="/images/pantrypal-logo-transparent-v3.png" alt="PantryPal" class="nav-logo-image">
        </a>
        <ul class="nav-links">
            <li><a href="/" data-page="home">Home</a></li>
            <li><a href="/pantry.html" data-page="pantry">Pantry</a></li>
            <li><a href="/results.html" data-page="results">Results</a></li>
            <li><a href="/planner.html" data-page="planner">Planner</a></li>
            <li><a href="/chat" data-page="chat">AI Chat</a></li>
            <li><a href="/about.html" data-page="about">About</a></li>
        </ul>
        <div class="nav-actions" id="nav-auth">
            <a href="/users/login" class="btn auth-btn auth-btn-secondary">Sign In</a>
            <a href="/users/new" class="btn auth-btn">Sign Up</a>
        </div>
    </nav>
    <div class="hero-header">
        <img src="/images/pantrypal-logo-transparent-v3.png" alt="PantryPal" class="hero-logo">
        <p>Find recipes with ingredients you already have</p>
    </div>
</header>

<main class="home-page-main">
<section class="home-svg-banner" aria-label="PantryPal home graphics">
    <div class="home-graphic-hero">
        <img class="home-svg-banner-img home-graphic-hero-img" src="/images/homepage-graphic-1.png" alt="">
        <div class="page center home-graphic-hero-panel">
            <div class="card hero-card">
                <h2>Start with what you have</h2>
                <p class="muted">Add ingredients, then we will find matching meals.</p>
                <div class="actions">
                    <a class="btn" href="/pantry.html">Start Cooking</a>
                </div>
            </div>
        </div>
    </div>
    <img class="home-svg-banner-img" src="/images/homepage-graphic-2.png" alt="">
    <div class="home-graphic-planner">
        <img class="home-svg-banner-img home-graphic-planner-img" src="/images/homepage-graphic-3.png" alt="">
        <div class="home-graphic-planner-panel">
            <a class="btn" href="/planner.html">Start planning</a>
        </div>
    </div>
    <img class="home-svg-banner-img" src="/images/homepage-graphic-4.png" alt="">
</section>
</main>
<script>
    fetch('/api/me')
        .then(res => res.json())
        .then(data => {
            const navAuth = document.getElementById('nav-auth');
            if (data.loggedIn) {
                const initial = data.username ? data.username[0].toUpperCase() : '?';
                navAuth.innerHTML = `
                    <div class="avatar-wrap">
                        <div class="avatar">${initial}</div>
                        <div class="avatar-dropdown">
                            <span class="avatar-dropdown-name">${data.username}</span>
                            <a href="/users/profile">Profile</a>
                            <a href="/users/logout" onclick="return confirm('Are you sure you want to log out?')">Log Out</a>
                        </div>
                    </div>`;
            }
        })
        .catch(() => {});
</script>
<script>
    (function () {
        const current = "home";
        document.querySelectorAll('.nav-links a[data-page="' + current + '"]')
            .forEach(function (link) {
                link.classList.add('active');
            });
    })();
</script>

</body>
</html>
